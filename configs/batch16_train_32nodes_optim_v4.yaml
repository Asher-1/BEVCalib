# BEVCalib all_training_data v4 — 大数据集最佳训练配置
#
# 基于 41 个模型的泛化评估总结 (v1+v2+v3+all_data):
#
#   已验证最优因子 (大数据集):
#     - StepLR: 0.747° vs CosineWR 1.237° (差 66%, 2.8x衰退)
#     - roll_weight=3.0: 有效 (含于 full-step 最佳配置)
#     - quantile_loss 单独无效 (1.467°) → 禁用
#     - roll_bias 单独无效 (1.300°) → 禁用
#
#   关键待验证:
#     - z=5 (BEV_ZBOUND_STEP=4.0): B26A 上 z=5 比 z=2 好 44%
#       预测 all_data z=5 可达 0.42~0.56° (vs 当前 z=2 的 0.747°)
#     - StepLR + strong_aug 组合: 之前 strong_aug 只在 CosineWR 下测试过
#
# 用法:
#   bash batch_train.sh configs/batch16_train_32nodes_optim_v4.yaml
#   bash batch_train.sh --dry-run configs/batch16_train_32nodes_optim_v4.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数 (v4: z=5 + StepLR 组合最优)
# ============================================================================
defaults:
  env:
    BEV_ZBOUND_STEP: 4.0  # z=5: 核心待验证变量, 预期突破0.5°

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 16
    learning_rate: 1e-4

    # 32 节点 DDP
    use_ddp: true
    ddp_gpus: 8
    nnodes: 32
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    # axis_loss=0.5 (跨数据集验证有效)
    enable_axis_loss: true
    weight_axis_rotation: 0.5

    # roll_weight=3.0 (跨数据集验证有效)
    axis_weights: "3.0,1.5,1.0"

    # StepLR (v3 证实: CosineWR 2.8x泛化衰退)
    lr_schedule: step
    warmup_epochs: 5
    backbone_lr_scale: 0.1

    # 正则化
    drop_path_rate: 0.1
    head_dropout: 0.1

    # per_axis_prob=0.3 (大数据集默认)
    perturb_distribution: truncated_normal
    per_axis_prob: 0.3

    # 禁用 roll_bias (跨数据集证明单独无效)
    per_axis_weights: null

    # strong_aug (大数据集: 强aug 0.962° > 轻aug 1.190°)
    augment_pc_jitter: 0.02
    augment_pc_dropout: 0.1
    augment_color_jitter: 0.3

    early_stopping_patience: 30

    foreground: true
    no_tensorboard: true
    tensorboard_port: 6007
    node_ip: "10.16.9.60"

# ============================================================================
# 实验组 (7 个精准实验, z=5 为核心变量)
# ============================================================================
experiments:
  # ===== 主实验: z=5 + 全量最优 =====
  # 预期: 0.42~0.56° (数据规模+几何先验互补)
  - name: "v4_z5_best"
    description: "v4最优: z5+StepLR+roll3+strong_aug+strong_tail"
    dataset: "all"
    version: "v4_z5_best"

  # ===== 消融1: z=5 + 无增强 =====
  # 验证: all-v3-full-step (z=2无aug=0.747°) 在 z=5 下的表现
  - name: "v4_z5_no_aug"
    description: "消融: z5+无数据增强(验证z5+无aug组合)"
    dataset: "all"
    version: "v4_z5_no_aug"
    params:
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0

  # ===== 消融2: z=5 + 无尾部 =====
  # 验证: tail_weight 与 z=5 是否正交
  - name: "v4_z5_no_tail"
    description: "消融: z5+无tail(验证尾部惩罚对z5的增益)"
    dataset: "all"
    version: "v4_z5_no_tail"
    params:
      tail_weight: 0.0

  # ===== 消融3: z=5 + per_axis_prob=0.2 =====
  # 验证: B26A 上 0.2 优于 0.3, 大数据集上是否也如此
  - name: "v4_z5_peraxis02"
    description: "消融: z5+per_axis_prob=0.2(B26A最优值)"
    dataset: "all"
    version: "v4_z5_peraxis02"
    params:
      per_axis_prob: 0.2

  # ===== 消融4: z=5 + 轻量增强 =====
  - name: "v4_z5_light_aug"
    description: "消融: z5+轻量增强(jitter=0.005,dropout=0.03,color=0.1)"
    dataset: "all"
    version: "v4_z5_light_aug"
    params:
      augment_pc_jitter: 0.005
      augment_pc_dropout: 0.03
      augment_color_jitter: 0.1

  # ===== 消融5: z=5 + 内参增强 =====
  # 验证: 随机扰动 fx/fy ±5%, 提升跨相机泛化
  - name: "v4_z5_intrinsic_aug"
    description: "消融: z5+内参增强±5%(提升跨传感器泛化)"
    dataset: "all"
    version: "v4_z5_intrinsic_aug"
    params:
      augment_intrinsic: 0.05

  # ===== 对照: z=2 + StepLR + strong_aug =====
  # 对比: v3 full-step (z=2无aug=0.747°) 加上 strong_aug 的效果
  - name: "v4_z2_reference"
    description: "对照: z2+StepLR+strong_aug(验证aug对z2的增益)"
    dataset: "all"
    version: "v4_z2_reference"
    env:
      BEV_ZBOUND_STEP: 10.0

# ============================================================================
# 使用说明
# ============================================================================
#
# 1. SLURM集群（推荐）:
#    sbatch --nodes=32 configs/run_batch_train.slurm
#    nnodes/node_rank/master_addr 自动从环境变量检测
#
# 2. 手动多机训练:
#    a) 确定master节点IP
#    b) Master: bash batch_train.sh configs/batch16_train_32nodes_optim_v4.yaml
#    c) Worker: 修改 node_rank 后执行同一命令
#
# 3. 评估 (必须用 bevcalib310 环境):
#    /opt/conda/envs/bevcalib310/bin/python run_generalization_eval.py \
#        --config configs/eval_generalization_all_v4.yaml
