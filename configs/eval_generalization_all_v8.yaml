# BEVCalib ALL V8 泛化性能评估 — Pitch定向优化
#
# V8 实验: 7组 Pitch 定向消融 (全部 Linear+quaternion+StepLR+无aug)
# + ALL V6 冠军 (0.494°) 作为对照基线
#
# 用法:
#   CUDA_VISIBLE_DEVICES=0 /opt/conda/envs/bevcalib310/bin/python run_generalization_eval.py \
#     --config configs/eval_generalization_all_v8.yaml

bevcalib_root: "/mnt/drtraining/user/dahailu/code/BEVCalib"
models_dir: "logs/all_training_data/v8"
test_data: "/mnt/drtraining/user/dahailu/data/bevcalib/test_data"
output_dir: "logs/evaluations/generalization_eval_all_v8"
eval_script: "evaluate_checkpoint.py"

eval_params:
  angle_range: 5.0
  trans_range: 0.15
  batch_size: 16
  vis_interval: 200
  timeout: 3600

models:
  # ==================== V8 Pitch定向优化 (7组) ====================

  - label: "v8-baseline"
    dir_name: "model_small_5deg_v8_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "v8-baseline"
    mode_desc: "ALL V8 冠军复现 Linear+quat+StepLR+无aug (Z=5, 0.494°目标)"

  - label: "v8-z10"
    dir_name: "model_small_5deg_v8_z10"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    version: "v8-z10"
    mode_desc: "ALL V8 Z=10 (zbound 2.0, 10 Z-voxel)"

  - label: "v8-pitch-wt3"
    dir_name: "model_small_5deg_v8_pitch_wt3"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "v8-pitch-wt3"
    mode_desc: "ALL V8 axis_weights=1,3,1 (Pitch梯度3x)"

  - label: "v8-z10-pitch-wt3"
    dir_name: "model_small_5deg_v8_z10_pitch_wt3"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    version: "v8-z10-pitch-wt3"
    mode_desc: "ALL V8 Z=10 + axis_weights=1,3,1 (双重Pitch优化)"

  - label: "v8-per-axis-pitch"
    dir_name: "model_small_5deg_v8_per_axis_pitch"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "v8-per-axis-pitch"
    mode_desc: "ALL V8 per_axis_weights=1,2,1 (Pitch扰动2x概率)"

  - label: "v8-z10-per-axis-pitch"
    dir_name: "model_small_5deg_v8_z10_per_axis_pitch"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    version: "v8-z10-per-axis-pitch"
    mode_desc: "ALL V8 Z=10 + per_axis_weights=1,2,1"

  - label: "v8-z10-pitch-all"
    dir_name: "model_small_5deg_v8_z10_pitch_all"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    version: "v8-z10-pitch-all"
    mode_desc: "ALL V8 Z=10 + axis_wt=1,3,1 + per_axis_wt=1,2,1 (全Pitch优化)"

  # ==================== 基线对照 ====================

  # ALL V6 冠军
  - label: "all-v6-champion"
    dir_name: "../v6/model_small_5deg_v6_linear_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_drcv: 0
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "all-v6-champion"
    mode_desc: "ALL V6 Linear+quat+StepLR (泛化冠军 0.494°)"
