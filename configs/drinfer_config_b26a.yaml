# =============================================================================
# BEVCalib DrInfer Conversion & Inference Configuration (B26A)
# =============================================================================
#
# 用法:
#   # flat 布局 (快速导出)
#   python utils/torch2drinfer.py --config configs/drinfer_config_b26a.yaml
#
#   # pmodel 布局 (完整部署目录)
#   python utils/torch2drinfer.py --config configs/drinfer_config_b26a.yaml --layout pmodel
#
#   # 推理对比
#   python utils/drinfer_infer.py --config configs/drinfer_config_b26a.yaml --mode compare

# -- Model checkpoint ----------------------------------------------------------
ckpt_path: "logs/B26A/model_small_5deg_v8-z5_axis_loss0.5_rotation/B26A_scratch/checkpoint/ckpt_400.pth"

# -- Dataset -------------------------------------------------------------------
dataset_root: "/mnt/drtraining/user/dahailu/data/bevcalib/b26a1_1_training_data"
validate_sample_ratio: 0.2

# -- Model architecture --------------------------------------------------------
deformable: false
bev_encoder: true
rotation_only: true

# -- Input dimensions ----------------------------------------------------------
img_height: 360
img_width: 640
max_num_points: 200000
pc_bev_channels: 128
bev_height: 100
bev_width: 100

# -- BEV settings --------------------------------------------------------------
bev_zbound_step: "4.0"   # z5: step=4.0 (5 Z-voxels)

# -- Evaluation parameters -----------------------------------------------------
angle_range_deg: 5.0
trans_range: 0.15
batch_size: 1             # DrInfer engine uses fixed batch_size=1
num_workers: 4
max_batches: 50            # 0 = evaluate all batches

# -- Export (torch2drinfer.py) -------------------------------------------------
export_strategy: "full"   # "full", "split", or "onnx"
export_dir: "logs/B26A/model_small_5deg_v8-z5_axis_loss0.5_rotation/drinfer"
model_name: "bevcalib_fusion_head"
model_version: "v1"

# -- Inference (drinfer_infer.py) ----------------------------------------------
inference_backend: "drinfer"   # "pytorch" or "drinfer"
device: "cuda"

# -- Report output -------------------------------------------------------------
report_output: "logs/B26A/model_small_5deg_v8-z5_axis_loss0.5_rotation/drinfer/eval_report.json"
