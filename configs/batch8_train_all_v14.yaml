# BEVCalib ALL V14 训练配置 — Pitch 平衡增强
#
# V14 核心动机 (V11 泛化评估深度分析):
#
#   1. Pitch 不平衡问题:
#      - 训练数据 11 seq 中 9 seq 为正 Pitch (R[1,0]>0), 仅 2 seq 为负 Pitch
#      - 扰动 ±5° (truncated_normal) 下, 总体正:负 ≈ 66:34
#      - 模型对负 Pitch 测试序列 (Seq02,06) 存在系统性高误差:
#        * 负 Pitch 组平均误差 0.788° vs 正 Pitch 组 0.256° (3.1x)
#        * 训练集 Seq04 (负Pitch) 误差 0.954° ≫ 正常水平 0.17°
#
#   2. 解决方案: GT Pitch Flip Augmentation
#      - 在扰动前, 随机对 GT 外参施加 Y 轴旋转 (±max_deg)
#      - ~3° 旋转即可翻转 Pitch 符号, 6° 范围覆盖大部分情况
#      - 使训练数据正/负 Pitch 接近 50:50
#      - 旋转应用于 GT, BEV 和修正目标保持一致 (无信息泄漏)
#
# V14 实验矩阵 (5组):
#   1. v14_v6_pflip:          V6 冠军 + pitch_flip (隔离增强效果)
#   2. v14_z10_p3_pflip:      Z=10 + pitch3 + pitch_flip (核心实验)
#   3. v14_z10_p3_pflip_low:  Z=10 + pitch3 + pitch_flip(prob=0.3) (轻度)
#   4. v14_z10_p3_pflip_cos:  Z=10 + pitch3 + pitch_flip + Cosine (全组合)
#   5. v14_z10_p3_baseline:   Z=10 + pitch3 无 flip (对照组)
#
# 用法 (本地单机8卡):
#   bash batch_train.sh configs/batch8_train_all_v14.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

defaults:
  env:
    BEV_ZBOUND_STEP: 4.0
    USE_DRCV_BACKEND: 1
    HF_HUB_OFFLINE: 1

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 16
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: 8
    nnodes: 32
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    enable_axis_loss: true
    weight_axis_rotation: 0.5

    use_mlp_head: 0
    use_geodesic_loss: 0

    drop_path_rate: 0.1
    head_dropout: 0.1

    perturb_distribution: truncated_normal
    per_axis_prob: 0.3
    per_axis_weights: null

    lr_schedule: step
    warmup_epochs: 5
    backbone_lr_scale: 0.1

    augment_pc_jitter: 0.0
    augment_pc_dropout: 0.0
    augment_color_jitter: 0.0
    augment_pitch_flip_prob: 0.0
    augment_pitch_flip_max_deg: 6.0

    early_stopping_patience: 30
    seed: 42

    eval_epoches: 50
    grad_accum_steps: 1

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

experiments:
  # =========================================================================
  # ALL V14: 5组实验 — Pitch 平衡增强消融
  # =========================================================================

  # 1. V6 冠军 + pitch_flip — 隔离增强效果
  #    V6 冠军 (Z=5, 1,1,1) 的唯一变量: +pitch_flip
  #    预期: 负 Pitch 序列误差从 0.788° 降到 <0.4°
  - name: "v14_v6_pflip"
    description: "ALL V14: V6冠军+pitch_flip(prob=0.5) 隔离增强效果"
    dataset: "all"
    version: "v14_v6_pflip"
    params:
      axis_weights: "1.0,1.0,1.0"
      augment_pitch_flip_prob: 0.5

  # 2. 核心实验: Z=10 + pitch3 + pitch_flip
  #    在历史最佳配置基础上加 pitch flip
  #    预期: 全序列泛化 <0.25°, 负 Pitch 序列 <0.35°
  - name: "v14_z10_p3_pflip"
    description: "ALL V14: Z=10+pitch3+pitch_flip(0.5) 核心实验"
    dataset: "all"
    version: "v14_z10_p3_pflip"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,3.0,1.0"
      augment_pitch_flip_prob: 0.5

  # 3. 轻度 pitch_flip — 测试 prob=0.3 vs 0.5
  #    prob=0.3: 约 30% 样本被翻转, 正:负 ≈ 56:44 (vs 原始 66:34)
  #    如果 0.3 与 0.5 效果相当, 则 0.3 对正 Pitch 性能损失更小
  - name: "v14_z10_p3_pflip_low"
    description: "ALL V14: Z=10+pitch3+pitch_flip(0.3) 轻度翻转"
    dataset: "all"
    version: "v14_z10_p3_pflip_low"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,3.0,1.0"
      augment_pitch_flip_prob: 0.3

  # 4. 全组合: Z=10 + pitch3 + pitch_flip + Cosine
  #    V12 实验表明 Cosine 可能对泛化有益, 与 pitch_flip 是正交的
  - name: "v14_z10_p3_pflip_cos"
    description: "ALL V14: Z=10+pitch3+pflip+Cosine (全组合)"
    dataset: "all"
    version: "v14_z10_p3_pflip_cos"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,3.0,1.0"
      augment_pitch_flip_prob: 0.5
      lr_schedule: cosine_warm_restarts
      cosine_T0: 50
      cosine_Tmult: 2
      warmup_epochs: 10

  # 5. 对照组: Z=10 + pitch3 无 flip
  #    与 v14_z10_p3_pflip 的唯一区别: 无 pitch flip
  - name: "v14_z10_p3_baseline"
    description: "ALL V14: Z=10+pitch3 对照组 (无pitch_flip)"
    dataset: "all"
    version: "v14_z10_p3_baseline"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,3.0,1.0"

# ============================================================================
# V14 消融矩阵 (5组)
# ============================================================================
#
#   实验                     | Z  | Pitch Wt | PFlip | LR      | 对照变量
#   -------------------------+----+----------+-------+---------+----------
#   1 v14_v6_pflip           | 5  | 1,1,1    | 0.5   | StepLR  | 隔离pflip效果
#   2 v14_z10_p3_pflip       | 10 | 1,3,1    | 0.5   | StepLR  | 核心实验
#   3 v14_z10_p3_pflip_low   | 10 | 1,3,1    | 0.3   | StepLR  | pflip强度
#   4 v14_z10_p3_pflip_cos   | 10 | 1,3,1    | 0.5   | Cosine  | +Cosine
#   5 v14_z10_p3_baseline    | 10 | 1,3,1    | 0.0   | StepLR  | 对照(无pflip)
#
# 关键对比:
#   1 vs all-v6-champion: pitch_flip 对 V6 基线的纯增益
#   2 vs 5: pitch_flip 在 Z=10+p3 配置下的增益 (核心验证)
#   3 vs 2: prob=0.3 vs 0.5, 轻度翻转是否足够
#   4 vs 2: Cosine LR 是否带来额外增益
#   5 vs V11/V12 同配置: 代码一致性验证
#
# 泛化评估重点关注:
#   - 负 Pitch 序列 (Test Seq 02, 06) 误差是否显著下降
#   - 正 Pitch 序列性能是否无退化
#   - 整体 Mean Rotation Error 是否优于 V6 冠军 (0.29°)
#
# 预期:
#   v14_v6_pflip: 泛化 ~0.22° (负Pitch从0.79→0.35°)
#   v14_z10_p3_pflip: 泛化 <0.20° (全面优化)
#   v14_z10_p3_baseline: ≈V12同配置 (对照基线)
