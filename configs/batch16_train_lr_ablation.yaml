# BEVCalib 批量训练配置文件 - 学习率消融实验（优化版）
# 对比不同初始学习率的影响

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数（所有实验继承）
# ============================================================================
defaults:
  env:
    BEV_ZBOUND_STEP: 2.0        # 使用最佳z配置
  
  params:
    # 扰动参数
    angle_range_deg: 5
    trans_range: 0.3
    
    # 训练参数
    batch_size: 16
    # learning_rate 由各实验指定（实验变量）
    
    # DDP配置
    use_ddp: true
    ddp_gpus: null
    
    # 训练模式
    use_compile: false
    rotation_only: false
    
    # 执行模式
    foreground: true
    no_tensorboard: true
    tensorboard_port: null
    
    # 多机DDP
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

# ============================================================================
# 实验组配置（只需指定不同的learning_rate）
# ============================================================================
experiments:
  # ============ 实验1: lr=1e-4 ============
  - name: "lr=1e-4"
    description: "学习率1e-4, 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v5-lr1e4"
    params:
      learning_rate: 0.0001     # 1e-4

  # ============ 实验2: lr=2e-4 (baseline) ============
  - name: "lr=2e-4"
    description: "学习率2e-4 (baseline), 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v5-lr2e4"
    params:
      learning_rate: 0.0002     # 2e-4 (默认值)

  # ============ 实验3: lr=5e-4 ============
  - name: "lr=5e-4"
    description: "学习率5e-4, 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v5-lr5e4"
    params:
      learning_rate: 0.0005     # 5e-4

  # ============ 实验4: lr=1e-3 ============
  - name: "lr=1e-3"
    description: "学习率1e-3, 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v5-lr1e3"
    params:
      learning_rate: 0.001      # 1e-3
