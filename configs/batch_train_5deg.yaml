# BEVCalib 批量训练配置文件 - 5度扰动Z分辨率对比实验（优化版）
# 使用 defaults 区域消除重复配置

# 全局配置（所有实验共享）
global:
  dry_run: false                # true: 仅打印命令不执行
  batch_log_dir: "logs"         # 批量训练日志目录
  wait_between_experiments: 10  # 实验间等待时间（秒）

# ============================================================================
# 默认参数（所有实验继承，除非实验中显式覆盖）
# ============================================================================
defaults:
  # 默认环境变量（可以被实验覆盖）
  env: {}
  
  # 默认训练参数（可以被实验覆盖）
  params:
    # 扰动参数
    angle_range_deg: 5          # 旋转扰动范围（度）
    trans_range: 0.3            # 平移扰动范围（米）
    
    # 训练参数
    batch_size: 16              # Batch size
    learning_rate: null         # 学习率（null使用默认）
    
    # DDP配置
    use_ddp: true               # 使用DDP
    ddp_gpus: null              # GPU数（null=自动检测）
    
    # 训练模式
    use_compile: false          # torch.compile
    rotation_only: false        # 仅优化旋转
    
    # 执行模式
    foreground: true            # 前台执行
    no_tensorboard: true        # 不启动TensorBoard
    tensorboard_port: null      # TB端口
    
    # 多机DDP（单机训练设为null）
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

# ============================================================================
# 实验组配置（只需指定与defaults不同的参数）
# ============================================================================
experiments:
  # ============ 实验1: z=1 ============
  - name: "z=1 (5deg DDP)"
    description: "Z步长20.0, 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v4-z1"
    env:
      BEV_ZBOUND_STEP: 20.0     # 只指定不同的参数
    # params使用defaults（无需重复）

  # ============ 实验2: z=5 ============
  - name: "z=5 (5deg DDP)"
    description: "Z步长4.0, 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v4-z5"
    env:
      BEV_ZBOUND_STEP: 4.0
    # params使用defaults

  # ============ 实验3: z=10 ============
  - name: "z=10 (5deg DDP)"
    description: "Z步长2.0, 5度扰动, DDP训练"
    dataset: "B26A"
    version: "v4-z10"
    env:
      BEV_ZBOUND_STEP: 2.0
    # params使用defaults


# ============================================================================
# 配置说明
# ============================================================================
#
# 1. defaults 区域:
#    - 定义所有实验的公共参数
#    - 包含 env 和 params 两部分
#    - 减少重复配置
#
# 2. 参数继承规则:
#    - 实验配置会继承 defaults 中的所有参数
#    - 如果实验中指定了相同参数，会覆盖 defaults
#    - 未在实验中指定的参数使用 defaults 的值
#
# 3. 示例:
#    defaults.params.batch_size = 16
#    experiment[0].params.batch_size = 32  → 使用 32（覆盖）
#    experiment[1].params (未指定)        → 使用 16（继承）
#
# 4. 优势:
#    - 消除重复配置
#    - 易于批量修改公共参数
#    - 实验配置更简洁
#    - 减少配置错误
#
# ============================================================================
