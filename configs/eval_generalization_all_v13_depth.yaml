# BEVCalib ALL V13 Depth 泛化性能评估
#
# V13 ALL Depth (4组实验, 对应 batch8_train_all_v13_depth.yaml):
#   A. v13-fd-replace-v2:  修复版 FD (SpatialAligner, 去 min-max)
#   B. v13-fd-dual-path:   双路融合 (FD depth + img feats -> depth_net)
#   C. v13-fd-supervision: 标准 LSS + FD 辅助深度监督 (推理无开销)
#   D. v13-baseline:       标准 LSS Z=10+pitch3+Cosine (对照组)
#
# 基线: Z=10+pitch3+CosineWR, 默认 batch_size=4 (FD模型)
#
# + ALL-V6 冠军对照
#
# 用法:
#   CUDA_VISIBLE_DEVICES=0 /opt/conda/envs/bevcalib310/bin/python run_generalization_eval.py \
#     --config configs/eval_generalization_all_v13_depth.yaml

bevcalib_root: "/mnt/drtraining/user/dahailu/code/BEVCalib"
models_dir: "logs/all_training_data/v13_depth"
test_data: "/mnt/drtraining/user/dahailu/data/bevcalib/test_data"
output_dir: "logs/evaluations/generalization_eval_all_v13_depth"
eval_script: "evaluate_checkpoint.py"

eval_params:
  angle_range: 5.0
  trans_range: 0.15
  batch_size: 16
  vis_interval: 200
  timeout: 3600

models:
  # ==================== V13 ALL Depth (4组) ====================

  - label: "v13-fd-replace-v2"
    dir_name: "model_small_5deg_v13_fd_replace_v2"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_mlp_head: 0
    use_foundation_depth: 1
    depth_model_type: midas_small
    fd_mode: replace_v2
    batch_size: 16
    angle_deg: 5
    z_voxels: 10
    version: "v13-fd-replace-v2"
    mode_desc: "ALL V13A Fixed FD replace_v2 (SpatialAligner)"

  - label: "v13-fd-dual-path"
    dir_name: "model_small_5deg_v13_fd_dual_path"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_mlp_head: 0
    use_foundation_depth: 1
    depth_model_type: midas_small
    fd_mode: dual_path
    batch_size: 16
    angle_deg: 5
    z_voxels: 10
    version: "v13-fd-dual-path"
    mode_desc: "ALL V13B Dual-path (FD depth + features)"

  - label: "v13-fd-supervision"
    dir_name: "model_small_5deg_v13_fd_supervision"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_mlp_head: 0
    use_foundation_depth: 1
    depth_model_type: midas_small
    fd_mode: supervision
    batch_size: 16
    angle_deg: 5
    z_voxels: 10
    version: "v13-fd-supervision"
    mode_desc: "ALL V13C LSS + FD depth supervision (alpha=0.5)"

  - label: "v13-baseline"
    dir_name: "model_small_5deg_v13_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    version: "v13-baseline"
    mode_desc: "ALL V13D 标准LSS Z=10+pitch3+Cosine (对照, 无FD)"

  # ==================== 基线 ====================

  - label: "all-v6-champion"
    dir_name: "../../all_training_data/v6/model_small_5deg_v6_linear_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "all-v6-champion"
    mode_desc: "ALL V6 泛化冠军 0.291"

  - label: "all-v8-z10-pitch3"
    dir_name: "../../all_training_data/v8/model_small_5deg_v8_z10_pitch_wt3"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    version: "all-v8-z10-pitch3"
    mode_desc: "ALL V8 Z=10+pitch3 (V8最佳)"
