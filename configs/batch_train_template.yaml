# BEVCalib 批量训练配置模板（v2 - 使用defaults）
# 使用 defaults 区域消除重复配置，提高可维护性

# ============================================================================
# 全局配置（影响batch_train.sh行为）
# ============================================================================
global:
  dry_run: false                # true: 仅打印命令不执行（测试配置）
  batch_log_dir: "logs"         # 批量训练日志目录
  wait_between_experiments: 10  # 实验间等待时间（秒，避免资源冲突）

# ============================================================================
# 默认参数（所有实验继承，除非实验中显式覆盖）
# ============================================================================
# 优势：
#   - 消除重复配置
#   - 易于批量修改公共参数
#   - 实验配置更简洁
#   - 减少配置错误
defaults:
  # ---------- 默认环境变量 ----------
  env:
    # BEV_ZBOUND_STEP: 4.0      # Z轴分辨率（通常每个实验不同）
    # CUDA_VISIBLE_DEVICES: "0,1,2,3"  # GPU设备ID（可选）
  
  # ---------- 默认训练参数 ----------
  params:
    # 数据扰动参数
    angle_range_deg: 5          # 旋转扰动范围（度）
    trans_range: 0.3            # 平移扰动范围（米）
    
    # 训练超参数
    batch_size: 16              # Batch size
    learning_rate: null         # 学习率（null=使用模型默认）
    
    # DDP多GPU并行
    use_ddp: true               # 是否使用DDP
    ddp_gpus: null              # 每台机器GPU数（null=自动检测）
    
    # 训练模式
    use_compile: false          # 是否启用torch.compile加速
    rotation_only: false        # 是否仅优化旋转（不优化平移）
    
    # 执行模式
    foreground: true            # 前台执行（false=后台nohup）
    no_tensorboard: true        # 不启动TensorBoard
    tensorboard_port: null      # TensorBoard端口（null=自动检测）
    
    # 多机DDP参数（单机训练设为null）
    nnodes: null                # 总机器数（null=1，单机）
    node_rank: null             # 当前机器编号（null=自动检测或0）
    master_addr: null           # Master节点IP（null=自动检测）
    master_port: null           # Master通信端口（null=自动检测）

# ============================================================================
# 实验组配置（只需指定与defaults不同的参数）
# ============================================================================
experiments:
  # ============ 实验1示例 ============
  - name: "示例实验1"
    description: "实验描述"
    
    # 基础配置（必需）
    dataset: "B26A"             # 数据集名称
    version: "v1"               # 实验版本号（用于日志目录）
    
    # 环境变量（可选，覆盖defaults.env）
    env:
      BEV_ZBOUND_STEP: 4.0      # 实验特定的环境变量
    
    # 训练参数（可选，覆盖defaults.params）
    params:
      # 只需指定与defaults不同的参数
      angle_range_deg: 10       # 覆盖defaults中的5
      batch_size: 32            # 覆盖defaults中的16
      # 其他参数继承defaults

  # ============ 实验2示例（最简配置） ============
  - name: "示例实验2"
    description: "完全使用defaults的实验"
    dataset: "B26A"
    version: "v2"
    env:
      BEV_ZBOUND_STEP: 20.0
    # params完全继承defaults（无需指定）

  # ============ 实验3示例（多机训练） ============
  - name: "多机训练示例"
    description: "2台机器16个GPU并行"
    dataset: "all"              # 多机训练适合大数据集
    version: "v3_multinode"
    env:
      BEV_ZBOUND_STEP: 4.0
    params:
      batch_size: 16
      nnodes: 2                 # 覆盖defaults，指定2台机器
      ddp_gpus: 8               # 每台机器8个GPU
      # node_rank/master_addr/master_port保持null，自动检测


# ============================================================================
# 配置文件格式说明
# ============================================================================
#
# 1. 结构层级:
#    global:           全局控制参数（batch_train.sh行为）
#    defaults:         默认值（所有实验继承）
#      env:           默认环境变量
#      params:        默认训练参数
#    experiments:      实验列表
#      [i].name:      实验名称
#      [i].dataset:   数据集
#      [i].version:   版本号
#      [i].env:       实验特定环境变量（合并到defaults.env）
#      [i].params:    实验特定参数（合并到defaults.params）
#
# 2. 参数继承规则:
#    - 实验首先继承 defaults 中的所有 env 和 params
#    - 实验中指定的参数会覆盖 defaults 中的同名参数
#    - 未在实验中指定的参数使用 defaults 的值
#    - 优先级: experiment.params > defaults.params
#
# 3. 完整参数列表（所有start_training.sh支持的选项）:
#
#    env:
#      BEV_ZBOUND_STEP: float    # Z轴分辨率（步长）
#      CUDA_VISIBLE_DEVICES: str # GPU设备ID
#
#    params:
#      angle_range_deg: float    # --angle
#      trans_range: float        # --trans
#      batch_size: int           # --bs
#      learning_rate: float      # --lr (null=默认)
#      use_ddp: bool             # --ddp
#      ddp_gpus: int             # --ddp <N> (null=自动)
#      use_compile: bool         # --compile
#      rotation_only: bool       # --rotation_only
#      foreground: bool          # --fg
#      no_tensorboard: bool      # --no-tb
#      tensorboard_port: int     # --tb_port <PORT> (null=自动)
#      nnodes: int               # --nnodes <N> (null=1)
#      node_rank: int            # --node_rank <R> (null=自动)
#      master_addr: str          # --master_addr <IP> (null=自动)
#      master_port: int          # --master_port <PORT> (null=自动)
#
# 4. 参数值约定:
#    - null:   使用默认值（不传递给start_training.sh）
#    - true:   布尔值true（传递标志）
#    - false:  布尔值false（不传递标志）
#    - number: 数值参数
#    - string: 字符串参数
#
# 5. 典型使用场景:
#
#    a) 单一变量消融:
#       defaults 中设置所有公共参数
#       experiments 中只覆盖待测试的变量
#       示例: 学习率消融 → defaults设置batch/ddp等，experiments只改lr
#
#    b) Z分辨率对比:
#       defaults 中设置训练配置
#       experiments 中只覆盖 BEV_ZBOUND_STEP
#
#    c) 多机训练:
#       defaults 中设置 nnodes/ddp_gpus 等多机公共参数
#       experiments 中只指定 dataset/version/env
#
# 6. 最佳实践:
#    - 将所有实验的公共参数放在 defaults 中
#    - 实验配置中只保留差异化参数
#    - 使用有意义的 name 和 description
#    - 多机训练建议使用 SLURM（自动检测）或生成脚本
#
# ============================================================================
