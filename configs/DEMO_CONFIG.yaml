# BEVCalib 演示配置 - 最小示例（优化版）
# 展示配置文件的最简单用法

global:
  dry_run: true  # 仅演示，不实际运行

# ============================================================================
# 默认参数（所有实验继承）
# ============================================================================
defaults:
  env: {}
  
  params:
    angle_range_deg: 5
    trans_range: 0.3
    batch_size: 16
    use_ddp: true
    foreground: true
    no_tensorboard: true

# ============================================================================
# 实验组配置（只需指定差异化参数）
# ============================================================================
experiments:
  # 实验1: 基线配置（完全使用defaults）
  - name: "基线实验"
    dataset: "B26A"
    version: "demo-baseline"
    env:
      BEV_ZBOUND_STEP: 4.0

  # 实验2: 高扰动配置（覆盖angle和trans）
  - name: "高扰动实验"
    dataset: "B26A"
    version: "demo-high"
    env:
      BEV_ZBOUND_STEP: 4.0
    params:
      angle_range_deg: 10       # 覆盖defaults
      trans_range: 0.5          # 覆盖defaults
