# BEVCalib B26A V6 泛化性能评估
# 8个V6模型 (MLP×3 + Linear×3 + 2个hires变体)
#
# V6 改进:
#   - MLP 3-layer 回归头 vs 单层 Linear
#   - Geodesic loss vs Quaternion loss
#   - BEV pool factor 变体 (hires_pool2x, hires_bs4)
#   - geodesic_drcv (无pool, geodesic loss)
#
# 训练时最佳 val_rot:
#   MLP + quaternion:  v6_baseline          val=0.1706°
#   MLP + geodesic:    v6_geodesic          val=0.1707°
#   MLP + geo + drcv:  v6_geodesic_drcv     val=0.1865°
#   MLP + geo + bs4:   v6_hires_bs4         val=0.1768°  (batch_size=4)
#   MLP + geo + pool2: v6_hires_pool2x      val=0.1937°  (bev_pool_factor=2)
#   Linear + quat:     v6_linear_baseline   val=0.2900°
#   Linear + geodesic: v6_linear_geodesic   val=0.2731°
#   Linear + geo+pool: v6_linear_hires      val=0.9155°  (bev_pool_factor=2)
#
# 用法:
#   CUDA_VISIBLE_DEVICES=0 /opt/conda/envs/bevcalib310/bin/python run_generalization_eval.py \
#     --config configs/eval_generalization_b26a_v6.yaml

bevcalib_root: "/mnt/drtraining/user/dahailu/code/BEVCalib"
models_dir: "logs/B26A/v6"
test_data: "/mnt/drtraining/user/dahailu/data/bevcalib/test_data"
output_dir: "logs/evaluations/generalization_eval_b26a_v6"
eval_script: "evaluate_checkpoint.py"

eval_params:
  angle_range: 5.0
  trans_range: 0.15
  batch_size: 4
  vis_interval: 200
  timeout: 3600

models:
  # ==================== MLP 回归头 (V6新增) ====================

  # 1. MLP + quaternion loss (baseline)
  - label: "v6-mlp-baseline"
    dir_name: "model_small_5deg_v6_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 1
    angle_deg: 5
    z_voxels: 5
    version: "v6-mlp-baseline"
    mode_desc: "V6 MLP头 + quaternion loss (val=0.1706°)"

  # 2. MLP + geodesic loss
  - label: "v6-mlp-geodesic"
    dir_name: "model_small_5deg_v6_geodesic"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 1
    angle_deg: 5
    z_voxels: 5
    version: "v6-mlp-geodesic"
    mode_desc: "V6 MLP头 + geodesic loss (val=0.1707°)"

  # 3. MLP + geodesic + drcv backend (无pool)
  - label: "v6-mlp-geodesic-drcv"
    dir_name: "model_small_5deg_v6_geodesic_drcv"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 1
    use_drcv: true
    angle_deg: 5
    z_voxels: 5
    version: "v6-mlp-geodesic-drcv"
    mode_desc: "V6 MLP头 + geodesic + drcv后端 (val=0.1865°)"

  # 4. MLP + geodesic + bs4 (小batch)
  - label: "v6-mlp-hires-bs4"
    dir_name: "model_small_5deg_v6_hires_bs4"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 1
    angle_deg: 5
    z_voxels: 5
    version: "v6-mlp-hires-bs4"
    mode_desc: "V6 MLP头 + geodesic + batch_size=4 (val=0.1768°)"

  # 5. MLP + geodesic + bev_pool_factor=2
  - label: "v6-mlp-hires-pool2x"
    dir_name: "model_small_5deg_v6_hires_pool2x"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 1
    bev_pool_factor: 2
    angle_deg: 5
    z_voxels: 5
    version: "v6-mlp-hires-pool2x"
    mode_desc: "V6 MLP头 + geodesic + BEV pool 2x (val=0.1937°)"

  # ==================== Linear 回归头 (对照组) ====================

  # 6. Linear + quaternion loss
  - label: "v6-linear-baseline"
    dir_name: "model_small_5deg_v6_linear_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "v6-linear-baseline"
    mode_desc: "V6 Linear头 + quaternion loss (val=0.2900°)"

  # 7. Linear + geodesic loss
  - label: "v6-linear-geodesic"
    dir_name: "model_small_5deg_v6_linear_geodesic"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "v6-linear-geodesic"
    mode_desc: "V6 Linear头 + geodesic loss (val=0.2731°)"

  # 8. Linear + geodesic + bev_pool_factor=2
  - label: "v6-linear-hires"
    dir_name: "model_small_5deg_v6_linear_hires"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 0
    bev_pool_factor: 2
    angle_deg: 5
    z_voxels: 5
    version: "v6-linear-hires"
    mode_desc: "V6 Linear头 + geodesic + BEV pool 2x (val=0.9155°)"

  # ==================== 基准模型 ====================

  # 9. v1-champion (历史最佳泛化)
  - label: "v1-champion"
    dir_name: "../v1/model_small_5deg_v7_opt_axis05"
    ckpt: "ckpt_400.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 5
    version: "v1-champion"
    mode_desc: "基准: v1冠军 ckpt_400 (历史最佳泛化)"
