# BEVCalib B26A V8 训练配置 — Pitch 定向优化
#
# V8 设计哲学:
#   基于 V6/V7 评估的核心共识:
#     - Linear + quaternion + StepLR + 无aug = 最优基座
#     - Geodesic loss 有害, MLP头有害, aug有害 (B26A)
#     - Pitch 占泛化误差 67-89%, 是最大优化空间
#     - Seq 03/04 的 Pitch 误差远超其他序列
#
# V8 策略: 在最优基座上做 Pitch 定向消融
#   P0: 增加 Z 分辨率 (5→10 Z-voxel), 减少 pitch-depth 混淆
#   P1: 加强 Pitch axis loss 权重 (1→3), loss 层面引导
#   P2: 训练扰动偏向 Pitch (per_axis_weights=1,2,1), 数据层面强化
#
# ALL 冠军配置 (baseline):
#   all-v6-linear-baseline: 泛化 0.494° (历史最佳)
#   Linear头 + quaternion loss + StepLR(step=80, gamma=0.5)
#   无aug, truncated_normal, per_axis_prob=0.3, axis_weights=1,1,1
#   BEV_ZBOUND_STEP=4.0 (5个Z-voxel), batch_size=8
#
# 实验设计 (7组 + ALL冠军 baseline, seed=42, 全部 Linear+quaternion+StepLR):
#   0. v8_baseline:          ALL冠军精确复现 (控制基线)
#   1. v8_z10:               Z=10 (zbound step 2.0)
#   2. v8_pitch_wt3:         axis_weights=1,3,1
#   3. v8_z10_pitch_wt3:     Z=10 + axis_weights=1,3,1
#   4. v8_per_axis_pitch:    per_axis_weights=1,2,1
#   5. v8_z10_per_axis_pitch: Z=10 + per_axis_weights=1,2,1
#   6. v8_z10_pitch_all:     Z=10 + axis_weights=1,3,1 + per_axis_weights=1,2,1
#
# 用法:
#   bash batch_train.sh configs/batch8_train_b26a_v8.yaml
#   bash batch_train.sh --dry-run configs/batch8_train_b26a_v8.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

defaults:
  env:
    BEV_ZBOUND_STEP: 4.0
    USE_DRCV_BACKEND: 1
    HF_HUB_OFFLINE: 1

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 8
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: null
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    enable_axis_loss: true
    weight_axis_rotation: 0.5

    use_mlp_head: 0
    use_geodesic_loss: 0

    lr_schedule: step
    warmup_epochs: 5
    backbone_lr_scale: 0.1

    drop_path_rate: 0.1
    head_dropout: 0.1

    perturb_distribution: truncated_normal
    per_axis_prob: 0.3
    per_axis_weights: null

    augment_pc_jitter: 0.0
    augment_pc_dropout: 0.0
    augment_color_jitter: 0.0

    early_stopping_patience: 30
    seed: 42

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

experiments:
  # =========================================================================
  # V8 Pitch定向优化: 7组消融 (全部 Linear+quaternion+StepLR+无aug)
  # =========================================================================

  # 0. ALL冠军精确复现 — 控制基线 (预期B26A ~1.10°)
  - name: "v8_baseline"
    description: "B26A V8: ALL冠军复现 Linear+quat+StepLR+无aug (控制基线)"
    dataset: "B26A"
    version: "v8_baseline"
    params:
      axis_weights: "1.0,1.0,1.0"

  # 1. Z=10: 更细Z分层 → 减少 pitch-depth 混淆
  - name: "v8_z10"
    description: "B26A V8: Z=10 (zbound 2.0, 10 Z-voxel)"
    dataset: "B26A"
    version: "v8_z10"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,1.0,1.0"

  # 2. Pitch axis权重=3: loss层面引导关注Pitch
  - name: "v8_pitch_wt3"
    description: "B26A V8: axis_weights=1,3,1 (Pitch梯度3x)"
    dataset: "B26A"
    version: "v8_pitch_wt3"
    params:
      axis_weights: "1.0,3.0,1.0"

  # 3. Z=10 + Pitch权重=3: 双重Pitch优化
  - name: "v8_z10_pitch_wt3"
    description: "B26A V8: Z=10 + axis_weights=1,3,1 (双重Pitch优化)"
    dataset: "B26A"
    version: "v8_z10_pitch_wt3"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,3.0,1.0"

  # 4. 训练扰动偏向Pitch: 数据层面强化
  - name: "v8_per_axis_pitch"
    description: "B26A V8: per_axis_weights=1,2,1 (Pitch扰动2x概率)"
    dataset: "B26A"
    version: "v8_per_axis_pitch"
    params:
      axis_weights: "1.0,1.0,1.0"
      per_axis_weights: "1.0,2.0,1.0"

  # 5. Z=10 + Pitch扰动偏向: 架构+数据双优化
  - name: "v8_z10_per_axis_pitch"
    description: "B26A V8: Z=10 + per_axis_weights=1,2,1"
    dataset: "B26A"
    version: "v8_z10_per_axis_pitch"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,1.0,1.0"
      per_axis_weights: "1.0,2.0,1.0"

  # 6. 全部Pitch优化叠加: Z=10 + 权重3 + 扰动偏向
  - name: "v8_z10_pitch_all"
    description: "B26A V8: Z=10 + axis_weights=1,3,1 + per_axis_weights=1,2,1 (全Pitch优化)"
    dataset: "B26A"
    version: "v8_z10_pitch_all"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      axis_weights: "1.0,3.0,1.0"
      per_axis_weights: "1.0,2.0,1.0"

  # 7. drcv后端A/B对照: 与v8_baseline唯一差异是USE_DRCV_BACKEND=1
  - name: "v8_baseline_drcv"
    description: "B26A V8: drcv后端 A/B对照 (vs v8_baseline, Linear+quat)"
    dataset: "B26A"
    version: "v8_baseline_drcv"
    env:
      USE_DRCV_BACKEND: 1
    params:
      axis_weights: "1.0,1.0,1.0"

# ============================================================================
# V8 消融矩阵 (8组, 全部 Linear+quaternion+StepLR+无aug)
# ============================================================================
#
#   实验                    | Z-voxel | axis_wt    | per_axis_wt | drcv | 对照
#   ------------------------+---------+------------+-------------+------+-----------
#   0 v8_baseline           | 5 (4.0) | 1,1,1      | null        | no   | 控制基线
#   1 v8_z10                | 10(2.0) | 1,1,1      | null        | no   | Z效果 (vs 0)
#   2 v8_pitch_wt3          | 5 (4.0) | 1,3,1      | null        | no   | 权重效果 (vs 0)
#   3 v8_z10_pitch_wt3      | 10(2.0) | 1,3,1      | null        | no   | Z+权重 (vs 1,2)
#   4 v8_per_axis_pitch     | 5 (4.0) | 1,1,1      | 1,2,1       | no   | 扰动效果 (vs 0)
#   5 v8_z10_per_axis_pitch | 10(2.0) | 1,1,1      | 1,2,1       | no   | Z+扰动 (vs 1,4)
#   6 v8_z10_pitch_all      | 10(2.0) | 1,3,1      | 1,2,1       | no   | 全叠加 (vs 3,5)
#   7 v8_baseline_drcv      | 5 (4.0) | 1,1,1      | null        | yes  | drcv A/B (vs 0)
#
# 关键对比:
#   1 vs 0: 纯Z分辨率增益 (P0假设: pitch-depth混淆)
#   2 vs 0: 纯Pitch梯度权重增益 (P1假设: loss引导)
#   4 vs 0: 纯Pitch扰动偏向增益 (P2假设: 数据分布)
#   3 vs 1,2: Z+权重交互效应
#   6 vs 3,5: 全优化叠加 vs 单一优化
#
# 预期 B26A 泛化目标 (对比 v6-linear-baseline 1.096°):
#   v8_baseline:           ~1.10° (复现)
#   v8_z10:                <1.00° (Z分辨率降Pitch混淆)
#   v8_pitch_wt3:          <1.05° (Pitch梯度增强)
#   v8_z10_pitch_wt3:      <0.90° (叠加效果)
#   v8_per_axis_pitch:     <1.05° (Pitch数据增强)
#   v8_z10_per_axis_pitch: <0.95° (叠加效果)
#   v8_z10_pitch_all:      <0.85° (全优化目标)
#   v8_baseline_drcv:      ~1.10° (与baseline比较drcv后端影响)
