# BEVCalib B26A v3 - 组合最优因子配置
#
# 基于 v1/v2 跨数据集泛化评估的最优发现:
#   - v1 最佳: v7-opt-axis05 (z=5, 0.429°, 0.7x衰退) → z=5 显著优于 z=2
#   - v2 最佳: v2-roll-weight-only (z=2, 0.767°, 1.3x衰退) → 单一 roll_weight=3.0 泛化最优
#   - v2 第二: v2-peraxis02 (z=2, 0.932°, 1.8x衰退) → per_axis_prob=0.2 优于默认 0.3
#   - v2 第三: v2-light-aug (z=2, 0.968°, 2.0x衰退) → 轻量增强有效
#
# v3 组合策略:
#   A. roll_weight=3.0 (axis_weights="3.0,1.5,1.0") — v2证实泛化最强
#   B. per_axis_prob=0.2 — 更多耦合扰动，泛化提升 22%
#   C. light_aug (jitter=0.005, dropout=0.03, color=0.1) — 稳定泛化
#   D. 无 quantile_loss / 无 roll_bias — 对泛化无正面贡献
#   E. 同时测试 z=5 和 z=2 — v1/v2对比显示z=5泛化更优
#
# 额外消融:
#   - CosineAnnealingLR vs StepLR: v1用cosine (0.429°), v2用step (0.767°)
#   - z=5 vs z=2: 验证高度分辨率对泛化的关键作用
#
# 用法:
#   bash batch_train.sh configs/batch8_train_b26a_optim_v3.yaml
#   bash batch_train.sh --dry-run configs/batch8_train_b26a_optim_v3.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数 (v3组合最优)
# ============================================================================
defaults:
  env:
    BEV_ZBOUND_STEP: 4.0  # z=5 (v1最优高度分辨率)
    USE_DRCV_BACKEND: 1

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 8
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: null
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    # v2证实: axis_loss=0.5 是甜蜜点
    enable_axis_loss: true
    weight_axis_rotation: 0.5

    # v3核心A: roll_weight=3.0 (v2-roll-weight-only 泛化冠军)
    axis_weights: "3.0,1.5,1.0"

    # v1最优: CosineAnnealingLR (v1的0.429° vs v2 StepLR的0.767°)
    lr_schedule: cosine
    warmup_epochs: 5
    backbone_lr_scale: 0.1

    # 正则化
    drop_path_rate: 0.1
    head_dropout: 0.1

    # v3核心B: per_axis_prob=0.2 (v2-peraxis02 泛化第二)
    perturb_distribution: truncated_normal
    per_axis_prob: 0.2

    # v3: 禁用 roll_bias 采样 (v2证实对泛化无正面贡献)
    per_axis_weights: null

    # v3核心C: 轻量数据增强 (v2-light-aug 泛化第三)
    augment_pc_jitter: 0.005
    augment_pc_dropout: 0.03
    augment_color_jitter: 0.1

    early_stopping_patience: 30

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

# ============================================================================
# 实验组
# ============================================================================
experiments:
  # ===== 主实验: v3 组合最优 (z=5) =====
  - name: "v3_combined_z5"
    description: "v3组合最优(z=5): roll_weight3+peraxis02+light_aug+cosine"
    dataset: "B26A"
    version: "v3_combined_z5"

  # ===== 对照: v3 组合最优 (z=2) =====
  - name: "v3_combined_z2"
    description: "v3组合最优(z=2): roll_weight3+peraxis02+light_aug+cosine"
    dataset: "B26A"
    version: "v3_combined_z2"
    env:
      BEV_ZBOUND_STEP: 10.0

  # ===== 消融1: StepLR vs CosineAnnealingLR (z=5) =====
  - name: "v3_step_lr_z5"
    description: "消融: StepLR(其余v3最优, z=5)"
    dataset: "B26A"
    version: "v3_step_lr_z5"
    params:
      lr_schedule: step

  # ===== 消融2: 无增强 (z=5) =====
  - name: "v3_no_aug_z5"
    description: "消融: 无数据增强(其余v3最优, z=5)"
    dataset: "B26A"
    version: "v3_no_aug_z5"
    params:
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0

  # ===== 消融3: 无 roll_weight 提升 (z=5) =====
  - name: "v3_no_roll_weight_z5"
    description: "消融: 旧权重(2,1.5,1)(其余v3最优, z=5)"
    dataset: "B26A"
    version: "v3_no_roll_weight_z5"
    params:
      axis_weights: "2.0,1.5,1.0"

  # ===== 消融4: per_axis_prob=0.3 (z=5, v2默认值) =====
  - name: "v3_peraxis03_z5"
    description: "消融: per_axis_prob=0.3(其余v3最优, z=5)"
    dataset: "B26A"
    version: "v3_peraxis03_z5"
    params:
      per_axis_prob: 0.3

  # ===== 消融5: v1最优复现 (axis05, z=5, cosine, 无aug, 无roll_weight) =====
  - name: "v3_v1_repro_z5"
    description: "v1最优复现: axis05+cosine+peraxis03+无aug+旧权重(z=5)"
    dataset: "B26A"
    version: "v3_v1_repro_z5"
    params:
      axis_weights: "2.0,1.5,1.0"
      per_axis_prob: 0.3
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0

  # ===== 消融6: 全量v3 + 更强增强 (z=5) =====
  - name: "v3_strong_aug_z5"
    description: "v3+更强增强: jitter=0.01+dropout=0.05+color=0.2(z=5)"
    dataset: "B26A"
    version: "v3_strong_aug_z5"
    params:
      augment_pc_jitter: 0.01
      augment_pc_dropout: 0.05
      augment_color_jitter: 0.2
