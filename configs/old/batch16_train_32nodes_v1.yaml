# BEVCalib 批量训练配置文件 - 多机DDP训练示例（优化版）
# 使用 defaults 区域消除重复配置

# 全局配置
global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数（所有实验继承）
# ============================================================================
# 多机训练公共配置：所有实验都使用2台机器，每台8个GPU
defaults:
  env: {
    BEV_ZBOUND_STEP: 4.0,
    USE_DRCV_BACKEND: 1,
    }
  
  params:
    # 扰动参数
    angle_range_deg: 5         # 5度扰动
    trans_range: 0.3

    # 轴向损失
    enable_axis_loss: true
    weight_axis_rotation: 0.3
    
    # 训练参数
    batch_size: 16              # 多机训练可以用更大的batch
    learning_rate: 1e-4         # 大batch适当增大学习率
    
    # DDP配置（多机必须配置）
    use_ddp: true
    ddp_gpus: 8                 # 每台机器8个GPU
    
    # 多机DDP配置（所有实验共享）
    nnodes: 32                  # 32台机器
    node_rank: null             # 自动检测（SLURM）或手动指定
    master_addr: null           # 自动检测（SLURM）或手动指定
    master_port: null           # 自动检测端口
    
    # 训练模式
    use_compile: false
    rotation_only: true
    
    # 执行模式
    foreground: true
    no_tensorboard: true
    tensorboard_port: null

# ============================================================================
# 实验组配置（只需指定dataset/version/env差异）
# ============================================================================
experiments:
  # ============ 实验1: enable_axis_loss=False (5deg rotation) ============
  - name: "enable_axis_loss=False (5deg rotation)"
    description: "(5deg rotation)"
    dataset: "all"
    version: "v5_z5_rotation_no_axis_loss"
    params:
      enable_axis_loss: False

  # ============ 实验2: enable_axis_loss=False (5deg rotation) ============
  - name: "enable_axis_loss=False (z=2)"
    description: "(5deg rotation z=2)"
    dataset: "all"
    version: "v5_z2_rotation_no_axis_loss"
    env:
      BEV_ZBOUND_STEP: 10.0
    params:
      enable_axis_loss: False

  # ============ 实验3: enable_axis_loss=True (5deg rotation) ============
  - name: "enable_axis_loss=True (5deg rotation)"
    description: "(5deg rotation)"
    dataset: "all"
    version: "v5_z5_rotation_axis_loss0.3"
    params:
      enable_axis_loss: True
      weight_axis_rotation: 0.3

  # ============ 实验4: enable_axis_loss=True (5deg rotation) ============
  - name: "enable_axis_loss=True (5deg rotation)"
    description: "(5deg rotation)"
    dataset: "all"
    version: "v5_z5_rotation_axis_loss1.0"
    params:
      enable_axis_loss: True
      weight_axis_rotation: 1.0

# ============================================================================
# 使用说明
# ============================================================================
#
# 1. SLURM集群（推荐）:
#    sbatch --nodes=2 configs/run_batch_train.slurm
#    nnodes/node_rank/master_addr 自动从环境变量检测
#
# 2. 手动多机训练:
#    a) 确定master节点IP（例如: 192.168.1.100）
#    b) 在Master节点（192.168.1.100）上:
#       修改配置: master_addr: "192.168.1.100"
#                node_rank: 0
#       bash batch_train.sh configs/batch16_train_multinode_v2.yaml
#
#    c) 在Worker节点（192.168.1.101）上:
#       修改配置: master_addr: "192.168.1.100"
#                node_rank: 1
#       bash batch_train.sh configs/batch16_train_multinode_v2.yaml
#
# 3. 使用自动生成脚本:
#    bash configs/generate_multinode_configs.sh \
#      configs/batch16_train_multinode_v2.yaml 2 192.168.1.100
#
#    然后在对应节点运行生成的配置文件
#
# ============================================================================
