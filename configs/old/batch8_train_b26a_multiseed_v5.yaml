# BEVCalib B26A v5 多seed验证
# 验证假说: v1 champion的0.431°优势来自随机初始化方差
# v5(seed=42)=0.502°, 尝试其他seed寻找更好的初始化

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

defaults:
  env:
    BEV_ZBOUND_STEP: 4.0
    USE_DRCV_BACKEND: 1

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 8
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: null
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    enable_axis_loss: true
    weight_axis_rotation: 0.5
    axis_weights: "1.0,1.0,1.0"

    lr_schedule: cosine_warm_restarts
    warmup_epochs: 5
    backbone_lr_scale: 0.1
    cosine_T0: 50
    cosine_Tmult: 2

    drop_path_rate: 0.1
    head_dropout: 0.1

    perturb_distribution: truncated_normal
    per_axis_prob: 0.3
    per_axis_weights: null

    augment_pc_jitter: 0.02
    augment_pc_dropout: 0.1
    augment_color_jitter: 0.3

    early_stopping_patience: 30

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

experiments:
  - name: "v5_cosinewr_z5_s41"
    description: "多seed: CosineWR+z5+strong_aug+no_roll3 seed=41"
    dataset: "B26A"
    version: "v5_cosinewr_z5_s41"
    params:
      seed: 41

  - name: "v5_cosinewr_z5_s43"
    description: "多seed: CosineWR+z5+strong_aug+no_roll3 seed=43"
    dataset: "B26A"
    version: "v5_cosinewr_z5_s43"
    params:
      seed: 43

  - name: "v5_cosinewr_z5_s44"
    description: "多seed: CosineWR+z5+strong_aug+no_roll3 seed=44"
    dataset: "B26A"
    version: "v5_cosinewr_z5_s44"
    params:
      seed: 44
