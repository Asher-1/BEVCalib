    angle_deg: 5
    z_voxels: 5
    voxel_mode: "scatter"
    scatter_reduce: "sum"
    to_bev_mode: "concat"
    version: "v14-v6-pflip-q"
    mode_desc: "Quick: V6+pflip (500帧/seq)"

  - label: "v14-z10-p3-pflip-q"
    dir_name: "model_small_5deg_v14_z10_p3_pflip_quick"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    voxel_mode: "scatter"
    scatter_reduce: "sum"
    to_bev_mode: "concat"
    version: "v14-z10-p3-pflip-q"
    mode_desc: "Quick: Z=10+p3+pflip (500帧/seq)"

  - label: "v14-z10-p3-pflip-low-q"
    dir_name: "model_small_5deg_v14_z10_p3_pflip_low_quick"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    voxel_mode: "scatter"
    scatter_reduce: "sum"
    to_bev_mode: "concat"
    version: "v14-z10-p3-pflip-low-q"
    mode_desc: "Quick: Z=10+p3+pflip(0.3) (500帧/seq)"

  - label: "v14-z10-p3-pflip-cos-q"
    dir_name: "model_small_5deg_v14_z10_p3_pflip_cos_quick"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    voxel_mode: "scatter"
    scatter_reduce: "sum"
    to_bev_mode: "concat"
    version: "v14-z10-p3-pflip-cos-q"
    mode_desc: "Quick: Z=10+p3+pflip+Cosine (500帧/seq)"

  - label: "v14-z10-p3-baseline-q"
    dir_name: "model_small_5deg_v14_z10_p3_baseline_quick"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "2.0"
    rotation_only: 1
    use_drcv: 1
    use_mlp_head: 0
    angle_deg: 5
    z_voxels: 10
    voxel_mode: "scatter"
    scatter_reduce: "sum"
    to_bev_mode: "concat"
    version: "v14-z10-p3-baseline-q"
    mode_desc: "Quick: Z=10+p3 对照组 (500帧/seq)"

  # ==================== 历史基线 ====================

  - label: "all-v6-champion"
    dir_name: "../../all_training_data/v6/model_small_5deg_v6_linear_baseline"
    ckpt: "ckpt_best_val.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
