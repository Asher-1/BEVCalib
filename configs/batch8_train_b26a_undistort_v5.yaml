# BEVCalib B26A 去畸变 v5 训练
#
# 使用去畸变后的 B26A 训练数据 (D=0, pinhole模型)
# 5个实验:
#   1. v5最佳配置: CosineWR+z5+强aug+seed=42 (5°扰动基线)
#   2. v1-champion配置: 与v1冠军相同超参(无固定seed)
#   3. v1-champion refine: 加载v1冠军ckpt + 低LR微调
#   4. 10°大扰动训练 + 5°评估: 验证大扰动是否提升小扰动泛化
#   5. 20°大扰动训练 + 5°评估: 验证更大扰动的效果
#
# 用法:
#   bash batch_train.sh configs/batch8_train_b26a_undistort_v5.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

defaults:
  env:
    BEV_ZBOUND_STEP: 4.0

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 8
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: null
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    enable_axis_loss: true
    weight_axis_rotation: 0.5

    lr_schedule: cosine_warm_restarts
    warmup_epochs: 5
    backbone_lr_scale: 0.1
    cosine_T0: 50
    cosine_Tmult: 2

    drop_path_rate: 0.1
    head_dropout: 0.1

    perturb_distribution: truncated_normal
    per_axis_prob: 0.3
    per_axis_weights: null

    augment_pc_jitter: 0.02
    augment_pc_dropout: 0.1
    augment_color_jitter: 0.3

    early_stopping_patience: 30

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

experiments:
  # ===== 实验1: v5最佳配置 (seed=42) =====
  # 与当前最佳泛化v5模型完全相同配置
  # 在去畸变数据上验证是否有提升
  - name: "v5_undist_best"
    description: "去畸变B26A: v5最佳配置 CosineWR+z5+强aug seed=42"
    dataset: "B26A"
    version: "v5_undist_best"
    params:
      axis_weights: "1.0,1.0,1.0"
      seed: 42

  # ===== 实验2: v1-champion配置 (无固定seed) =====
  # 复现v1冠军的训练配置: 不固定seed, 无axis_weights
  # 验证去畸变是否让v1配置更稳定
  - name: "v5_undist_v1cfg"
    description: "去畸变B26A: v1-champion配置复现 (无固定seed)"
    dataset: "B26A"
    version: "v5_undist_v1cfg"
    params: {}

  # ===== 实验3: 基于v1-champion refine =====
  # 加载v1冠军ckpt_400, 用低LR在去畸变数据上微调
  # lr=5e-6 (之前验证的最佳refine LR), StepLR, 100ep
  - name: "v5_undist_refine_v1champ"
    description: "去畸变B26A: refine v1-champion ckpt_400 lr=5e-6"
    dataset: "B26A"
    version: "v5_undist_refine_v1champ"
    params:
      pretrain_ckpt: "/mnt/drtraining/user/dahailu/code/BEVCalib/logs/B26A/v1/model_small_5deg_v7_opt_axis05/B26A_scratch/checkpoint/ckpt_400.pth"
      learning_rate: 5e-6
      lr_schedule: step
      warmup_epochs: 0
      step_size: 40
      num_epochs: 100
      seed: 42

  # ===== 实验4: 10°大扰动训练 + 5°评估 =====
  # 训练时用±10°扰动, 验证时用±5°扰动
  # 假说: 大扰动训练迫使模型学习更鲁棒的特征, 在小扰动下泛化更好
  - name: "v5_undist_angle10"
    description: "去畸变B26A: 10°大扰动训练 + 5°评估 (验证大扰动泛化)"
    dataset: "B26A"
    version: "v5_undist_angle10"
    params:
      axis_weights: "1.0,1.0,1.0"
      seed: 42
      angle_range_deg: 10
      eval_angle_range_deg: 5

  # ===== 实验5: 20°大扰动训练 + 5°评估 =====
  # 训练时用±20°扰动, 验证时用±5°扰动
  # 假说: 更大的扰动范围进一步增强鲁棒性, 但可能因难度过大影响收敛
  - name: "v5_undist_angle20"
    description: "去畸变B26A: 20°大扰动训练 + 5°评估 (验证极大扰动泛化)"
    dataset: "B26A"
    version: "v5_undist_angle20"
    params:
      axis_weights: "1.0,1.0,1.0"
      seed: 42
      angle_range_deg: 20
      eval_angle_range_deg: 5
