# BEVCalib 批量训练配置文件 - 学习率消融实验（优化版）
# 使用 defaults 区域消除重复配置

# 全局配置
global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数（所有实验继承）
# ============================================================================
defaults:
  env:
    BEV_ZBOUND_STEP: 4.0        # 所有实验统一使用 z=5

  params:
    # 扰动参数
    angle_range_deg: 5
    trans_range: 0.3
    
    # 训练参数
    batch_size: 16
    # learning_rate 由各实验指定（这是实验变量）
    
    # DDP配置
    use_ddp: true
    ddp_gpus: null
    
    # 训练模式
    use_compile: false
    rotation_only: false
    
    # 执行模式
    foreground: true
    no_tensorboard: true
    tensorboard_port: null
    
    # 多机DDP
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

# ============================================================================
# 实验组配置（只需指定不同的learning_rate）
# ============================================================================
experiments:
  # ============ 实验1: 学习率 1e-3 ============
  - name: "lr=1e-3"
    description: "基准学习率测试"
    dataset: "B26A"
    version: "v4-lr1e3"
    params:
      learning_rate: 1e-3       # 只覆盖learning_rate

  # ============ 实验2: 学习率 5e-4 ============
  - name: "lr=5e-4"
    description: "降低学习率测试"
    dataset: "B26A"
    version: "v4-lr5e4"
    params:
      learning_rate: 5e-4

  # ============ 实验3: 学习率 1e-4 ============
  - name: "lr=1e-4"
    description: "更低学习率测试"
    dataset: "B26A"
    version: "v4-lr1e4"
    params:
      learning_rate: 1e-4

  # ============ 实验4: 学习率 5e-5 ============
  - name: "lr=5e-5"
    description: "极低学习率测试"
    dataset: "B26A"
    version: "v4-lr5e5"
    params:
      learning_rate: 5e-5
