# BEVCalib all_training_data v5 — 基于全量评估的最优配置
#
# ===== 跨版本 + 跨数据集核心结论 =====
#
#   B26A 全局排名:
#     #1 v1-champion   = 0.431° (CosineWR, z5, no_roll3, strong_aug, ckpt_400, 无seed)
#     #2 v5-cosinewr-z5= 0.502° (CosineWR, z5, no_roll3, strong_aug, best_val, seed=42)
#     #3 v5-ep320      = 0.528° (同配置, ckpt_320)
#     #4 v4-angle20-z5 = 0.572° (StepLR, z5, ±20°, roll3, strong_aug)
#
#   ALL 全局排名:
#     #1 v2-champion   = 0.560° (StepLR, z2, no_aug, no_roll3, uniform)
#     #2 v4-z5-strong = 0.651° (StepLR, z5, strong_aug, roll3)
#     #3 v4-z5-int-aug = 0.859° (内参增强)
#
#   关键发现 (已确认):
#     1. ALL v4 最优配置 0.651° vs 带强惩罚项的较差配置 1.316° (约2x)
#     2. CosineWR 在B26A上远优于StepLR: 0.502° vs 0.654° — ALL未验证
#     3. no_roll3 (axis_weights=1:1:1) 优于 roll3: B26A 0.502° vs 0.584° (+15%)
#     4. strong_aug 有益: B26A 0.502° vs no_aug 0.612° (-17%)
#     5. best_val 是正确的checkpoint策略, ckpt_400 在CosineWR restart后严重衰退
#     6. seed方差显著: v1(无seed)0.431° vs v5(seed=42)0.502° 差0.071°
#     7. ±5°训练→±5°评估 在B26A上优于±20° (0.502° vs 0.650°)
#
#   v5 ALL策略: 将B26A最优配置迁移到ALL + 多seed验证 + CosineWR大数据集验证
#   目标: 突破0.50°
#
# 用法:
#   bash batch_train.sh configs/batch16_train_32nodes_optim_v5.yaml
#   bash batch_train.sh --dry-run configs/batch16_train_32nodes_optim_v5.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数 (v5: B26A最优配置迁移 + CosineWR)
# ============================================================================
defaults:
  env:
    BEV_ZBOUND_STEP: 4.0  # z=5 (跨版本跨数据集验证有效)

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 16
    learning_rate: 1e-4

    # 32 节点 DDP
    use_ddp: true
    ddp_gpus: 8
    nnodes: 32
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    # axis_loss=0.5 (跨版本验证有效)
    enable_axis_loss: true
    weight_axis_rotation: 0.5

    # 等权 1:1:1 (B26A v5: no_roll3 0.502° > roll3 0.584°, v2冠军也无roll3)
    axis_weights: "1.0,1.0,1.0"

    # CosineWR (B26A最优LR策略, ALL上首次验证)
    # P3: ep150-350 收敛期, best_val 预期保存在P3
    lr_schedule: cosine_warm_restarts
    warmup_epochs: 5
    backbone_lr_scale: 0.1
    cosine_T0: 50
    cosine_Tmult: 2

    # 正则化
    drop_path_rate: 0.1
    head_dropout: 0.1

    # truncated_normal + per_axis_prob=0.3 (B26A v1/v5 通用配置)
    perturb_distribution: truncated_normal
    per_axis_prob: 0.3
    per_axis_weights: null

    # strong_aug (B26A v5: aug 0.502° > no_aug 0.612°)
    augment_pc_jitter: 0.02
    augment_pc_dropout: 0.1
    augment_color_jitter: 0.3

    early_stopping_patience: 30
    seed: 42

    foreground: true
    no_tensorboard: true
    tensorboard_port: 6007
    node_ip: "10.16.9.60"

# ============================================================================
# 实验组 (4 个实验 — 仅保留对泛化有明确影响的变量)
# ============================================================================
#
# 精简逻辑:
#   移除 multi-seed (ALL 32节点训练成本高, seed验证放到B26A)
#   移除 ±20° (B26A已证实 ±5° > ±20°: 0.502° vs 0.650°)
#   保留: CosineWR vs StepLR × aug vs no_aug 的2×2全覆盖
#
experiments:
  # ===== 主实验: CosineWR + z5 + strong_aug (B26A最优迁移) =====
  # B26A v5 最优配置直接迁移到ALL
  # 预期: < 0.50° (CosineWR隐式正则 + z5几何先验 + no_roll3)
  - name: "v5_cosinewr_z5_aug"
    description: "v5主实验: CosineWR+z5+strong_aug+no_roll3 (seed=42)"
    dataset: "all"
    version: "v5_cosinewr_z5_aug"

  # ===== 消融: StepLR + strong_aug (隔离LR策略) =====
  # v4-z5最优(StepLR+roll3)=0.651° → 去掉roll3后的StepLR表现
  - name: "v5_step_z5_aug"
    description: "消融: StepLR+z5+strong_aug+no_roll3 (隔离LR策略, 对照主实验)"
    dataset: "all"
    version: "v5_step_z5_aug"
    params:
      lr_schedule: step

  # ===== 消融: CosineWR + 无增强 (隔离aug影响) =====
  # v2冠军(无aug)=0.560°是ALL最佳, CosineWR+z5+无aug可能更好
  - name: "v5_cosinewr_z5_noaug"
    description: "消融: CosineWR+z5+无aug+uniform (v2冠军简配+CosineWR)"
    dataset: "all"
    version: "v5_cosinewr_z5_noaug"
    params:
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0
      perturb_distribution: uniform
      per_axis_prob: 0.0

  # ===== 对照: StepLR + 无aug + z5 (v2冠军+z5 baseline) =====
  # v2冠军z=2: 0.560° → z=5应更好, 最简配置基线
  - name: "v5_step_z5_noaug"
    description: "对照: StepLR+z5+无aug+uniform (v2冠军配置+z5升级)"
    dataset: "all"
    version: "v5_step_z5_noaug"
    params:
      lr_schedule: step
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0
      perturb_distribution: uniform
      per_axis_prob: 0.0

# ============================================================================
# 实验设计: 2×2 全覆盖
# ============================================================================
#
#              | strong_aug   | no_aug
#   -----------+--------------+-----------
#   CosineWR   | 实验1(主)    | 实验3
#   StepLR     | 实验2        | 实验4(对照)
#
# ============================================================================
# 使用说明
# ============================================================================
#
# 1. SLURM集群（推荐）:
#    sbatch --nodes=32 configs/run_batch_train.slurm
#    nnodes/node_rank/master_addr 自动从环境变量检测
#
# 2. 评估 (必须用 bevcalib310 环境):
#    /opt/conda/envs/bevcalib310/bin/python run_generalization_eval.py \
#        --config configs/eval_generalization_all_v5.yaml
