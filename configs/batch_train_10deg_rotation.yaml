# BEVCalib 批量训练配置文件 - 10度rotation-only Z分辨率对比实验（优化版）
# 使用 defaults 区域消除重复配置

# 全局配置
global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数（所有实验继承）
# ============================================================================
defaults:
  env: {}
  
  params:
    # 扰动参数
    angle_range_deg: 10         # 10度扰动
    trans_range: 0.3            # 平移范围（rotation-only时无用）
    
    # 训练参数
    batch_size: 16
    learning_rate: null
    
    # DDP配置
    use_ddp: true
    ddp_gpus: null
    
    # 训练模式
    use_compile: false
    rotation_only: true         # 仅优化旋转
    
    # 执行模式
    foreground: true
    no_tensorboard: true
    tensorboard_port: null
    
    # 多机DDP
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

# ============================================================================
# 实验组配置
# ============================================================================
experiments:
  # ============ 实验1: z=1 rotation-only ============
  - name: "z=1 (10deg rotation)"
    description: "Z步长20.0, 10度rotation-only"
    dataset: "B26A"
    version: "v4-z1-rotation"
    env:
      BEV_ZBOUND_STEP: 20.0

  # ============ 实验2: z=5 rotation-only ============
  - name: "z=5 (10deg rotation)"
    description: "Z步长4.0, 10度rotation-only"
    dataset: "B26A"
    version: "v4-z5-rotation"
    env:
      BEV_ZBOUND_STEP: 4.0

  # ============ 实验3: z=10 rotation-only ============
  - name: "z=10 (10deg rotation)"
    description: "Z步长2.0, 10度rotation-only"
    dataset: "B26A"
    version: "v4-z10-rotation"
    env:
      BEV_ZBOUND_STEP: 2.0
