# BEVCalib 批量训练配置文件 - Batch=8 5度rotation-only完整消融实验（优化版）
# 使用 defaults 区域消除重复配置

# 全局配置
global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数（所有实验继承）
# ============================================================================
defaults:
  env: {}
  
  params:
    # 扰动参数
    angle_range_deg: 5          # 5度扰动
    trans_range: 0.3
    
    # 训练参数
    batch_size: 8               # Batch=8
    learning_rate: null
    
    # DDP配置
    use_ddp: true
    ddp_gpus: null
    
    # 训练模式
    use_compile: false
    rotation_only: true         # 仅优化旋转
    
    # 执行模式
    foreground: true
    no_tensorboard: true
    tensorboard_port: null
    
    # 多机DDP
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

# ============================================================================
# 实验组配置
# ============================================================================
experiments:
  # ============ Z分辨率消融（z=1/5/10） ============
  - name: "z=1 (5deg rotation, bs=8)"
    description: "Z步长20.0, 5度rotation-only, batch=8"
    dataset: "B26A"
    version: "v6-z1-rotation-bs8-lr1e-4"
    env:
      BEV_ZBOUND_STEP: 20.0
    params:
      angle_range_deg: 5
      learning_rate: 1e-4

  - name: "z=5 (5deg rotation, bs=8)"
    description: "Z步长4.0, 5度rotation-only, batch=8"
    dataset: "B26A"
    version: "v6-z5-rotation-bs8-lr1e-4"
    env:
      BEV_ZBOUND_STEP: 4.0
    params:
      angle_range_deg: 5
      learning_rate: 1e-4

  - name: "z=10 (5deg rotation, bs=8)"
    description: "Z步长2.0, 5度rotation-only, batch=8"
    dataset: "B26A"
    version: "v6-z10-rotation-bs8-lr1e-4"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      angle_range_deg: 5
      learning_rate: 1e-4
