# BEVCalib all V10 — Foundation Depth 训练配置
#
# V10 核心假设:
#   LSS 的 depth_net 学习了训练集特定的深度统计分布，是泛化瓶颈。
#   用预训练深度模型（MiDaS）替代 depth_net，提供跨场景泛化的深度先验。
#
# 架构变化:
#   原 LSS:     img_feats → depth_net → softmax(D bins) → depth × features
#   Foundation: raw_imgs → 冻结MiDaS → relative_depth → aligner → bins → depth × features
#
# 实验设计 (3组, ALL数据集):
#   1. v10_fd_baseline:  Foundation Depth + 标准配置 (Z=5, 1,1,1)
#   2. v10_fd_z10_pitch3: Foundation Depth + Z=10 + pitch3 (V9最佳组合)
#   3. v10_std_baseline:  标准 LSS 对照组 (与 v10_fd_baseline 同配置)
#   
#   4. v10_A10_baseline:  Aangle=10 + 标准配置 (Z=5, 1,1,1)
#   5. v10_A10_fd_z10_pitch3: Aangle=10 + Foundation Depth + Z=10 + pitch3 (最佳组合)
#
# 用法 (32节点集群):
#   bash batch_train.sh configs/batch8_train_all_v10.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

defaults:
  env:
    BEV_ZBOUND_STEP: 4.0
    USE_DRCV_BACKEND: 1
    HF_HUB_OFFLINE: 0

  params:
    # === 扰动范围 ===
    angle_range_deg: 5         # 训练时旋转扰动范围 (±5°)
    trans_range: 0.15          # 训练时平移扰动范围 (±0.15m)

    # === 训练基础配置 ===
    batch_size: 16             # 每GPU的batch size
    learning_rate: 1e-4        # 初始学习率 (AdamW)

    # === 分布式训练 (DDP) ===
    use_ddp: true
    ddp_gpus: 8
    nnodes: 1
    node_rank: null
    master_addr: null
    master_port: null

    # === 模型配置 ===
    use_compile: false         # torch.compile (实验性)
    rotation_only: true        # 仅预测旋转 (3-DOF)

    # === 损失函数 ===
    enable_axis_loss: true     # 启用逐轴旋转损失 (R/P/Y)
    weight_axis_rotation: 0.5  # 逐轴损失权重系数

    # === 回归头 & 损失类型 ===
    use_mlp_head: 0            # 0=Linear, 1=MLP三层
    use_geodesic_loss: 0       # 0=L1旋转损失, 1=geodesic

    # === 正则化 ===
    drop_path_rate: 0.1        # SwinT drop path率
    head_dropout: 0.1          # 回归头dropout

    # === 训练扰动策略 ===
    perturb_distribution: truncated_normal
    per_axis_prob: 0.3         # 单轴扰动概率
    per_axis_weights: null     # R/P/Y采样权重

    # === 学习率调度 ===
    lr_schedule: step          # StepLR (每step_size epoch衰减0.5)
    warmup_epochs: 5           # 线性warmup epoch数
    backbone_lr_scale: 0.1     # backbone学习率缩放 (lr × 0.1)

    # === 数据增强 ===
    augment_pc_jitter: 0.0     # 点云高斯噪声σ (米)
    augment_pc_dropout: 0.0    # 点云随机丢弃比例
    augment_color_jitter: 0.0  # 图像颜色抖动强度

    # === 训练控制 ===
    early_stopping_patience: 30  # 早停patience (0=关闭)
    seed: 42                   # 全局随机种子

    # === Quick模式加速参数 ===
    max_frames_per_seq: 500   # 每序列最大帧数 (均匀采样)
    eval_epoches: 50           # 每N个epoch验证一次
    grad_accum_steps: 1        # 梯度累积步数 

    voxel_mode: "scatter"
    scatter_reduce: "sum"
    to_bev_mode: "concat"

    # === 运行模式 ===
    foreground: true           # 前台运行 (batch模式必须)
    no_tensorboard: true       # 关闭TensorBoard
    tensorboard_port: null

experiments:
  # 1. Foundation Depth 基线 — 验证深度模型替代LSS的可行性
  #    HF_HUB_OFFLINE=0 允许下载MiDaS权重
  - name: "v10_fd_baseline"
    description: "all V10: Foundation Depth + Z=5 + 1,1,1 (MiDaS small)"
    dataset: "all"
    version: "v10_fd_baseline_quick"
    params:
      use_foundation_depth: 1
      depth_model_type: midas_small
      axis_weights: "1.0,1.0,1.0"
      batch_size: 16

  # 2. Foundation Depth + V9最佳组合 — Z=10 + pitch3
  - name: "v10_fd_z10_pitch3"
    description: " V10: Foundation Depth + Z=10 + pitch3 (最佳组合)"
    dataset: "all"
    version: "v10_fd_z10_pitch3_quick"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      use_foundation_depth: 1
      depth_model_type: midas_small
      axis_weights: "1.0,3.0,1.0"
      batch_size: 16

  # 3. 标准 LSS 对照组 — 与 v10_fd_baseline 完全相同，仅关闭 foundation depth
  - name: "v10_std_baseline"
    description: "all V10: 标准LSS + Z=5 + 1,1,1 (对照组)"
    dataset: "all"
    version: "v10_std_baseline_quick"
    params:
      axis_weights: "1.0,1.0,1.0"

  # 4.
  - name: "v10_A10_baseline"
    description: "all V10: Aangle=10 + 1,1,1 (对照组)"
    dataset: "all"
    version: "v10_A10_baseline_quick"
    params:
      axis_weights: "1.0,1.0,1.0"
      angle_range_deg: 10

  # 5.
  - name: "v10_A10_fd_z10_pitch3"
    description: " V10: Aangle=10 + Foundation Depth + Z=10 + pitch3 (最佳组合)"
    dataset: "all"
    version: "v10_A10_fd_z10_pitch3_quick"
    env:
      BEV_ZBOUND_STEP: 2.0
    params:
      use_foundation_depth: 1
      depth_model_type: midas_small
      axis_weights: "1.0,3.0,1.0"
      angle_range_deg: 10
      batch_size: 16