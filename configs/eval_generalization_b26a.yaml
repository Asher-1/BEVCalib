# 泛化性能评估配置文件
# 用法: python run_generalization_eval.py --config configs/eval_generalization.yaml

# 全局路径配置
bevcalib_root: "/mnt/drtraining/user/dahailu/code/BEVCalib"
models_dir: "logs/B26A"  # 相对于 bevcalib_root
test_data: "/mnt/drtraining/user/dahailu/data/bevcalib/test_data"
output_dir: "logs/b26a_multi_eval_generalization_5deg"  # 相对于 bevcalib_root
eval_script: "evaluate_checkpoint.py"  # 相对于 bevcalib_root

# 评估参数
eval_params:
  angle_range: 5.0
  trans_range: 0.15
  batch_size: 8
  vis_interval: 200
  timeout: 1800

# 模型列表
models:
  - label: "10deg-v2-z5"
    dir_name: "model_small_5deg_v7-z5_rotation"
    ckpt: "ckpt_400.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    angle_deg: 5
    z_voxels: 5
    version: "v7"
    mode_desc: "rotation+translation"

  - label: "5deg-v8-z5-axis_loss0.5"
    dir_name: "model_small_5deg_v8-z5_axis_loss0.5_rotation"
    ckpt: "ckpt_400.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    angle_deg: 5
    z_voxels: 5
    version: "v8"
    mode_desc: "rotation+translation"

  - label: "5deg-v8-z5-base"
    dir_name: "model_small_5deg_v8-z5_base_rotation"
    ckpt: "ckpt_400.pth"
    bev_zbound_step: "4.0"
    rotation_only: 1
    angle_deg: 5
    z_voxels: 5
    version: "v8"
    mode_desc: "rotation_only"
