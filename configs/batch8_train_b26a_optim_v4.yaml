# BEVCalib B26A v4 — 小数据集最佳训练配置
#
# 基于 41 个模型的泛化评估总结 (v1+v2+v3+all_data):
#
#   已验证最优因子:
#     - z=5 (BEV_ZBOUND_STEP=4.0): 比 z=2 泛化提升 44% (0.429° vs 0.767°)
#     - StepLR: 单调收敛找到平坦极小值, CosineWR 找到尖锐极小值泛化差
#     - roll_weight=3.0: v2 泛化冠军 (0.767°), 比默认权重好
#     - per_axis_prob=0.2: 比 0.3 泛化提升 22%
#     - axis_loss=0.5: v1 最佳 (0.429° vs axis03的0.717°)
#     - strong_aug: v1 最佳模型使用 (jitter=0.02, dropout=0.1, color=0.3)
#     - quantile_loss 单独无效 → 禁用
#     - roll_bias 单独无效 → 禁用
#
#   目标: 组合所有已验证最优因子, 预期 < 0.4°
#
# 用法:
#   bash batch_train.sh configs/batch8_train_b26a_optim_v4.yaml
#   bash batch_train.sh --dry-run configs/batch8_train_b26a_optim_v4.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

# ============================================================================
# 默认参数 (v4 综合最优)
# ============================================================================
defaults:
  env:
    BEV_ZBOUND_STEP: 4.0  # z=5, 小数据集必须

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 8
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: null
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    # axis_loss=0.5 (v1最佳)
    enable_axis_loss: true
    weight_axis_rotation: 0.5

    # roll_weight=3.0 (v2泛化冠军)
    axis_weights: "3.0,1.5,1.0"

    # StepLR (v3证实: CosineWR泛化差 2.8x衰退, StepLR 0.9x)
    lr_schedule: step
    warmup_epochs: 5
    backbone_lr_scale: 0.1

    # 正则化
    drop_path_rate: 0.1
    head_dropout: 0.1

    # per_axis_prob=0.2 (v2泛化第二, 比0.3好22%)
    perturb_distribution: truncated_normal
    per_axis_prob: 0.2

    # 禁用 roll_bias (跨数据集证明单独无效)
    per_axis_weights: null

    # strong_aug (v1最佳模型配置)
    augment_pc_jitter: 0.02
    augment_pc_dropout: 0.1
    augment_color_jitter: 0.3

    early_stopping_patience: 30

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

# ============================================================================
# 实验组 (8 个精准实验)
# ============================================================================
experiments:
  # ===== 主实验: v4 综合最优 (z=5) =====
  # 预期: < 0.4° (组合 v1 的 z=5/aug + v2 的 roll3/peraxis02)
  - name: "v4_best (z=5)"
    description: "v4综合最优: z5+StepLR+roll3+peraxis02+strong_aug"
    dataset: "B26A"
    version: "v4_best_z5"

  # ===== 消融1: 轻量增强 =====
  # 验证: v2 显示轻aug对小数据有效, 但 v1 用了强aug
  - name: "v4_light_aug (z=5)"
    description: "消融: 轻量增强(jitter=0.005,dropout=0.03,color=0.1)"
    dataset: "B26A"
    version: "v4_light_aug_z5"
    params:
      augment_pc_jitter: 0.005
      augment_pc_dropout: 0.03
      augment_color_jitter: 0.1

  # ===== 消融2: 无增强 =====
  - name: "v4_no_aug (z=5)"
    description: "消融: 无数据增强"
    dataset: "B26A"
    version: "v4_no_aug_z5"
    params:
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0

  # ===== 消融4: 内参增强 =====
  # 验证: 训练时随机扰动 fx/fy ±5%, 提升对未见相机的鲁棒性
  - name: "v4_intrinsic_aug (z=5)"
    description: "消融: 内参增强±5%(提升跨相机泛化)"
    dataset: "B26A"
    version: "v4_intrinsic_aug_z5"
    params:
      augment_intrinsic: 0.05

  # ===== 消融5: 10° 旋转扰动 =====
  # 验证: 增大训练扰动范围是否提升精度 (论文用±20°训练→±5°评估)
  # 更强的BEV位移信号 (60m处: 10.6m vs 5.3m位移) 有助学习更强几何表示
  # eval_angle_range_deg=5: 验证时统一用±5°, 与基线可比
  - name: "v4_angle10 (z=5)"
    description: "消融: ±10°训练→±5°评估(2x训练信号强度)"
    dataset: "B26A"
    version: "v4_angle10_z5"
    params:
      angle_range_deg: 10
      eval_angle_range_deg: 5

  # ===== 消融6: 20° 旋转扰动 =====
  # 验证: 和论文一致的大扰动范围, BEV位移信号最强 (60m处: 21.1m = 10.6网格)
  # 预期: 训练误差可能升高, 但模型学到更鲁棒的特征, ±5°评估时精度提升
  # eval_angle_range_deg=5: 验证时统一用±5°, 与基线可比
  - name: "v4_angle20 (z=5)"
    description: "消融: ±20°训练→±5°评估(论文级信号强度)"
    dataset: "B26A"
    version: "v4_angle20_z5"
    params:
      angle_range_deg: 20
      eval_angle_range_deg: 5

  # ===== 对照: z=2 =====
  # 验证: v4最优因子在 z=2 上的表现 (预期退化)
  - name: "v4_z2_control"
    description: "对照: z=2(其余参数不变, 验证z重要性)"
    dataset: "B26A"
    version: "v4_z2_control"
    env:
      BEV_ZBOUND_STEP: 10.0
