# BEVCalib B26A V7 训练配置 (合并v6-aug Linear组 + V7新增实验)
#
# 合并策略:
#   v6-aug A1-A4 与 V7 完全重叠, v6-aug B1-B4(MLP组)根据V6分析结论移除
#   V7新增: v7_baseline(V6最佳复现), v7_pitch_wt(StepLR+aug+pitch加权)
#
# 基于 V6 ALL vs B26A 泛化对比分析核心结论:
#   - Linear + quaternion 是最优组合 (ALL上 0.494° 新历史最佳)
#   - MLP头在所有场景下泛化更差 (过参数化, 衰退7x vs 3x) — 不再测试
#   - Geodesic loss 对 Linear 头有害 (差20%) — 不再测试
#   - 数据量是泛化第一驱动力 (ALL比B26A好58%)
#   - Pitch占误差67-89%, 是最大优化空间
#
# 实验设计 (6组, seed=42, 全部 Linear+quaternion):
#   1. v7_baseline:      无aug + StepLR + 1,1,1    (V6最佳复现, 控制基线)
#   2. v7_aug:           有aug + StepLR + 1,1,1    (纯aug增益)
#   3. v7_pitch_wt:      有aug + StepLR + 1,2,1    (aug + Pitch定向优化)
#   4. v7_cosine:        无aug + CosineWR + 1,1,1  (纯LR增益)
#   5. v7_aug_cosine:    有aug + CosineWR + 1,1,1  (aug+LR叠加)
#   6. v7_pitch_cosine:  有aug + CosineWR + 1,2,1  (全配置最优预期)
#
# 用法:
#   bash batch_train.sh configs/batch8_train_b26a_v7.yaml
#   bash batch_train.sh --dry-run configs/batch8_train_b26a_v7.yaml

global:
  dry_run: false
  batch_log_dir: "logs"
  wait_between_experiments: 10

defaults:
  env:
    BEV_ZBOUND_STEP: 4.0
    HF_HUB_OFFLINE: 1

  params:
    angle_range_deg: 5
    trans_range: 0.15
    batch_size: 8
    learning_rate: 1e-4

    use_ddp: true
    ddp_gpus: null
    nnodes: null
    node_rank: null
    master_addr: null
    master_port: null

    use_compile: false
    rotation_only: true

    enable_axis_loss: true
    weight_axis_rotation: 0.5

    use_mlp_head: 0
    use_geodesic_loss: 0

    drop_path_rate: 0.1
    head_dropout: 0.1

    perturb_distribution: truncated_normal
    per_axis_prob: 0.3
    per_axis_weights: null

    early_stopping_patience: 30
    seed: 42

    foreground: true
    no_tensorboard: true
    tensorboard_port: null

experiments:
  # =========================================================================
  # 组A: StepLR 系列 (3组)
  # =========================================================================

  # 1. V6最佳复现: 无aug + StepLR (控制基线, 预期B26A~1.19°)
  - name: "v7_baseline"
    description: "B26A V7: Linear+quat+StepLR+无aug (V6复现)"
    dataset: "B26A"
    version: "v7_baseline"
    params:
      lr_schedule: step
      warmup_epochs: 5
      backbone_lr_scale: 0.1
      axis_weights: "1.0,1.0,1.0"
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0

  # 2. 加aug: 分离aug增益 (原v6-aug A1)
  - name: "v7_aug"
    description: "B26A V7: Linear+quat+StepLR+有aug (分离aug增益)"
    dataset: "B26A"
    version: "v7_aug"
    params:
      lr_schedule: step
      warmup_epochs: 5
      backbone_lr_scale: 0.1
      axis_weights: "1.0,1.0,1.0"
      augment_pc_jitter: 0.02
      augment_pc_dropout: 0.1
      augment_color_jitter: 0.3

  # 3. aug + Pitch加权: StepLR下的Pitch定向优化 (V7新增)
  - name: "v7_pitch_wt"
    description: "B26A V7: Linear+quat+StepLR+aug+pitch_wt=1,2,1"
    dataset: "B26A"
    version: "v7_pitch_wt"
    params:
      lr_schedule: step
      warmup_epochs: 5
      backbone_lr_scale: 0.1
      axis_weights: "1.0,2.0,1.0"
      augment_pc_jitter: 0.02
      augment_pc_dropout: 0.1
      augment_color_jitter: 0.3

  # =========================================================================
  # 组B: CosineWR 系列 (3组)
  # =========================================================================

  # 4. CosineWR无aug: 分离LR增益 (原v6-aug A2)
  - name: "v7_cosine"
    description: "B26A V7: Linear+quat+CosineWR+无aug (分离LR增益)"
    dataset: "B26A"
    version: "v7_cosine"
    params:
      lr_schedule: cosine_warm_restarts
      cosine_T0: 50
      cosine_Tmult: 2
      warmup_epochs: 5
      backbone_lr_scale: 0.1
      axis_weights: "1.0,1.0,1.0"
      augment_pc_jitter: 0.0
      augment_pc_dropout: 0.0
      augment_color_jitter: 0.0

  # 5. CosineWR+aug: aug+LR叠加 (原v6-aug A3)
  - name: "v7_aug_cosine"
    description: "B26A V7: Linear+quat+CosineWR+有aug (aug+LR叠加)"
    dataset: "B26A"
    version: "v7_aug_cosine"
    params:
      lr_schedule: cosine_warm_restarts
      cosine_T0: 50
      cosine_Tmult: 2
      warmup_epochs: 5
      backbone_lr_scale: 0.1
      axis_weights: "1.0,1.0,1.0"
      augment_pc_jitter: 0.02
      augment_pc_dropout: 0.1
      augment_color_jitter: 0.3

  # 6. 全配置最优: CosineWR+aug+Pitch加权 (原v6-aug A4)
  - name: "v7_pitch_cosine"
    description: "B26A V7: Linear+quat+CosineWR+aug+pitch_wt=1,2,1 (预期最优)"
    dataset: "B26A"
    version: "v7_pitch_cosine"
    params:
      lr_schedule: cosine_warm_restarts
      cosine_T0: 50
      cosine_Tmult: 2
      warmup_epochs: 5
      backbone_lr_scale: 0.1
      axis_weights: "1.0,2.0,1.0"
      augment_pc_jitter: 0.02
      augment_pc_dropout: 0.1
      augment_color_jitter: 0.3

# ============================================================================
# V7 消融矩阵 (6组, 全部 Linear + quaternion)
# ============================================================================
#
#   实验               | LR       | Aug | Axis Weights | 对照
#   -------------------+----------+-----+--------------+----------------------------
#   1 v7_baseline      | StepLR   | 无  | 1,1,1        | V6最佳复现, 控制基线
#   2 v7_aug           | StepLR   | 有  | 1,1,1        | 纯aug增益 (vs 1)
#   3 v7_pitch_wt      | StepLR   | 有  | 1,2,1        | +Pitch加权 (vs 2)
#   4 v7_cosine        | CosineWR | 无  | 1,1,1        | 纯LR增益 (vs 1)
#   5 v7_aug_cosine    | CosineWR | 有  | 1,1,1        | aug+LR (vs 2,4)
#   6 v7_pitch_cosine  | CosineWR | 有  | 1,2,1        | 全配置最优 (vs 5)
#
# 预期 B26A 泛化目标:
#   v7_baseline:     ~1.19° (复现)
#   v7_aug:          <1.10° (aug对B26A有效, 参考V5-undist-best 1.047°)
#   v7_pitch_wt:     <1.00° (Pitch加权)
#   v7_cosine:       <1.15° (CosineWR微幅提升)
#   v7_aug_cosine:   <1.00° (V5最佳配置复现)
#   v7_pitch_cosine: <0.90° (全配置最优)
