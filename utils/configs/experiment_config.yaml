# BEVCalib实验分析配置文件
# 修改此配置文件可以快速切换要分析的实验组

# 实验基本信息
experiment:
  name: "BEVCalib Z-Ablation 实验分析"
  description: "BEV高度体素分辨率消融实验"
  dataset: "B26A (约1544帧)"
  test_dataset: "test_data (1446帧, 3个sequences)"

# BEVCalib项目路径
paths:
  bevcalib_root: "/mnt/drtraining/user/dahailu/code/BEVCalib"
  logs_base: "/mnt/drtraining/user/dahailu/code/BEVCalib/logs/B26A"
  test_data: "/mnt/drtraining/user/dahailu/data/bevcalib/test_data"
  output_dir: "/mnt/drtraining/user/dahailu/code/BEVCalib/analysis_results"

# 实验组配置
# 每个实验需要指定：
#   - model_dir: 模型日志目录名（相对于logs_base）
#   - zbound_step: BEV Z方向步长（用于评估）
#   - checkpoint: checkpoint文件名（默认ckpt_400.pth）
experiments:
  - name: "z=1"
    model_dir: "model_small_5deg_v4-z1"
    zbound_step: 20.0
    checkpoint: "ckpt_400.pth"
  
  - name: "z=5"
    model_dir: "model_small_5deg_v4-z5"
    zbound_step: 4.0
    checkpoint: "ckpt_400.pth"
  
  - name: "z=10"
    model_dir: "model_small_5deg_v4-z10"
    zbound_step: 2.0
    checkpoint: "ckpt_400.pth"

# 评估配置
evaluation:
  angle_range_deg: 5.0
  trans_range: 0.3
  batch_size: 8
  rotation_only: true
  vis_interval: 100
  use_conda: true
  conda_env: "bevcalib"
  run_test_eval: true  # 是否运行测试集评估
  parallel: false      # 是否并行评估（当前不支持）

# 可视化配置
visualization:
  generate_plots: true
  plot_style: "default"  # 可选: seaborn, ggplot等
  figsize:
    convergence: [16, 12]
    generalization: [16, 6]
    component: [16, 6]

# 报告配置
report:
  generate_report: true
  output_filename: "ANALYSIS_REPORT.md"
  include_convergence_milestones: [20, 40, 80, 120, 200, 400]


